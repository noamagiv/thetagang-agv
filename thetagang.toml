[meta]
schema_version = 2

[run]
# "grid" is the only supported strategy in this fork.
strategies = ["grid"]

# ---------------------------------------------------------------------------
# Runtime / connection settings
# ---------------------------------------------------------------------------

[runtime.account]
# Your IBKR account number.
number = "DU1234567"

# Cancel any existing open orders for configured symbols at startup.
cancel_orders = true

# Fraction of net liquidation value used as available capital.
# 0.5 = 50% of NLV.  Do not exceed 1.0 without understanding margin risk.
margin_usage = 0.5

# Market data type:  1=live  2=frozen  3=delayed  4=delayed-frozen
market_data_type = 1

[runtime.option_chains]
# Number of expiration dates to scan per symbol.
expirations = 4
# Number of strikes to scan per expiration.
strikes = 10

[runtime.orders]
# Default order-routing exchange for option legs.
exchange = "SMART"

# After initial submission, reprice unfilled orders after a random delay
# in this range (seconds).
price_update_delay = [30, 60]

# Minimum net credit to accept for any spread (global floor; per-symbol
# min_credit takes precedence).
minimum_credit = 0.05

[runtime.orders.algo]
strategy = "Adaptive"
params   = [["adaptivePriority", "Patient"]]

[runtime.database]
# Persist order intents, executions, account snapshots, and events to SQLite.
enabled = true
path    = "data/thetagang.db"
# Override with a full SQLAlchemy URL if needed:
# url = "sqlite:////absolute/path/thetagang.db"

[runtime.ib_async]
# Seconds to wait for IBKR API responses before timing out.
api_response_wait_time = 60
# Uncomment to write the ib_async wire log to a file:
# logfile = "data/ib_async.log"

[runtime.ibc]
# "paper" or "live"
tradingMode = "paper"
userid      = ""
password    = ""
gateway     = true
ibcPath     = "/opt/ibc"
ibcIni      = "/etc/thetagang/config.ini"
javaPath    = "/opt/java/openjdk/bin"

[runtime.watchdog]
host         = "127.0.0.1"
port         = 7497
clientId     = 1
connectTimeout  = 2
appStartupTime  = 30
appTimeout      = 20
probeTimeout    = 4
retryDelay      = 2

[runtime.watchdog.probeContract]
secType  = "STK"
symbol   = "SPY"
currency = "USD"
exchange = "SMART"

[runtime.exchange_hours]
# IANA exchange calendar ID used to gate runs.
exchange = "XNYS"
# "exit"=stop if closed  "wait"=block until open  "continue"=ignore hours
action_when_closed  = "exit"
# Seconds after open to wait before placing orders.
delay_after_open    = 1800
# Seconds before close to stop placing orders.
delay_before_close  = 1800
# Max seconds to wait for market to open before exiting.
max_wait_until_open = 3600

# ---------------------------------------------------------------------------
# Grid credit spread strategy
# ---------------------------------------------------------------------------
#
# One [strategies.grid.symbols.<TICKER>] section per instrument.
# The bot will:
#   1. Compute grid levels between lower_bound and upper_bound.
#   2. Apply bias to determine which levels are active.
#   3. Place a bull-put spread at each active level below price.
#   4. Place a bear-call spread at each active level above price.
#   5. Stop when max_loss_per_symbol or max_exposure_per_symbol is reached.
#
# Order ref pattern:  tg:grid-spread:{SYMBOL}:{kind}:{strike:.2f}:{expiry}
# Example:            tg:grid-spread:SPY:bull_put:480.00:20241220
# ---------------------------------------------------------------------------

[strategies.grid.symbols.SPY]
# Price range for the grid.
lower_bound = 450.0
upper_bound = 580.0

# Distance between grid levels.
# Use grid_spacing for a fixed dollar step, or grid_spacing_pct for a
# percentage of the current price.  Exactly one must be set.
grid_spacing = 5.0
# grid_spacing_pct = 0.01   # 1% of current price

# Width of each spread (distance between short and long leg), in dollars.
spread_width = 5.0

# Number of contracts per grid level.
contracts_per_level = 1

# Nearest expiry to target (days).  The engine picks the closest expiry
# that is at least this many days away.
target_dte = 21

# Minimum net credit per contract to accept.  Levels producing less credit
# are skipped.
min_credit = 0.20

# Hard cap on cumulative maximum loss across all open spreads for this symbol.
# Once the running total would exceed this, no further spreads are opened.
# max_loss per spread ≈ (spread_width - min_credit) × 100 × contracts_per_level
max_loss_per_symbol = 5000.0

# Hard cap on total margin requirement (spread_width × 100 × contracts) for
# all open spreads for this symbol.
max_exposure_per_symbol = 10000.0

# Primary exchange for the underlying stock/ETF.
primary_exchange = "ARCA"

[strategies.grid.symbols.SPY.bias]
# "bullish"  → only bull-put spreads (below price)
# "bearish"  → only bear-call spreads (above price)
# "neutral"  → both sides up to buy_levels / sell_levels
mode = "bullish"

# Maximum number of active bull-put spread levels below current price.
buy_levels = 8

# Maximum number of active bear-call spread levels above current price.
# Ignored when mode = "bullish".
sell_levels = 3

# ---------------------------------------------------------------------------
# Add more symbols below as needed, e.g.:
#
# [strategies.grid.symbols.QQQ]
# lower_bound             = 380.0
# upper_bound             = 480.0
# grid_spacing            = 5.0
# spread_width            = 5.0
# contracts_per_level     = 1
# target_dte              = 21
# min_credit              = 0.15
# max_loss_per_symbol     = 3000.0
# max_exposure_per_symbol = 6000.0
# primary_exchange        = "NASDAQ"
#
# [strategies.grid.symbols.QQQ.bias]
# mode        = "neutral"
# buy_levels  = 5
# sell_levels = 5
# ---------------------------------------------------------------------------
